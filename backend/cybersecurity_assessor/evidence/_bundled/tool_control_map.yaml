# Tool/daemon-name -> NIST 800-53 control map (deterministic recall floor).
#
# A terse CTP terminal-output evidence file is named for the TOOL it tests
# (CTP-013_clam_av_step8.txt). The tool name is a near-definitional control
# SIGNAL that carries no doc/CCI/control-ID token, so the LLM judge often
# abstains on it. This map FLOORS a located (non-affirming) tag so the artifact
# is never silently dropped.
#
# Schema:  <tool-token>: {controls: [<cid>, ...], ambiguous: <bool>}
#   ambiguous=false -> single-purpose daemon; emits the deterministic floor.
#   ambiguous=true  -> polysemous token (ssh/sudo/vault); JUDGE CANDIDATE ONLY,
#                      never a blind floor (the judge must confirm).
#
# SCALABILITY: this file is the DEFAULT pack (DoD RHEL/PaaS toolchain). A
# per-program override at  ~/.cybersecurity-assessor/evidence/tool_control_map.yaml
# is merged over this at load time, so a customer adds Windows/cloud tools as
# CONFIG, not a code change. control ids are catalog form (lowercase, ac-17,
# si-3, cm-7.5). Cross-family mappings are intentional (aide -> si-7 file
# integrity even when filed under CM) and are NOT folder-gated.

aide:
  controls:
  - si-7
  - cm-3
  ambiguous: false
