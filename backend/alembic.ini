; Alembic config for cybersecurity-assessor.
;
; THIS FILE IS FOR THE SHELL `alembic` CLI ONLY (e.g. running
; `cd backend && alembic upgrade head` from a dev terminal). The sidecar
; never reads it — cybersecurity_assessor/migrations.py builds an Alembic
; Config programmatically so the same code path works in source checkouts,
; installed wheels, and PyInstaller bundles where no .ini file is on disk.
;
; If you change script_location or env.py behavior, update migrations.py to
; match — the two paths must stay in sync.
;
; script_location uses the package-style notation so the alembic directory
; ships *inside* the cybersecurity_assessor package, matching what
; migrations._resolve_script_location() resolves at runtime via
; importlib.resources.
;
; The sqlalchemy.url field is intentionally empty. env.py reads the DB URL
; from config.db_path() at runtime.

[alembic]
script_location = cybersecurity_assessor:alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
; no hooks — we format migrations by hand to keep the diff readable.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
